[package]
edition = "2021"
rust-version = "1.75.0"
name = "ssd1306"
version = "0.10.0"
authors = ["James Waples <jamwaffles@gmail.com>"]
build = false
exclude = [
    "build.rs",
    "build.sh",
    "memory.x",
    "doc",
    "*.jpg",
    "*.png",
    "*.bmp",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "I2C/SPI driver for the SSD1306 OLED display controller"
documentation = "https://docs.rs/ssd1306"
readme = "README.md"
keywords = [
    "no-std",
    "ssd1306",
    "oled",
    "embedded",
    "embedded-hal-driver",
]
categories = [
    "embedded",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-embedded-community/ssd1306"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
