[dependencies.display-interface-spi]
version = "0.5.0"

[dependencies.embedded-graphics-core]
version = "0.4.0"
optional = true

[dependencies.embedded-hal]
version = "1.0.0"

[dependencies.embedded-hal-async]
version = "1.0.0"
optional = true

[dependencies.maybe-async-cfg]
version = "=0.2.4"

[dev-dependencies.embedded-graphics]
version = "0.8.0"

[target.'cfg(target_arch="arm")'.dev-dependencies.cortex-m]
version = "0.7.2"
features = ["critical-section-single-core"]

[target.'cfg(target_arch="arm")'.dev-dependencies.cortex-m-rt]
