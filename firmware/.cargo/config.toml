[target.'cfg(target_arch = "xtensa")']
rustflags = [
    "-C", "link-arg=-Wl,-Tlinkall.x",
    "-C", "link-arg=-Wl,-Tdefmt.x",
    "-C", "link-arg=-nostartfiles",
]

[target.thumbv7em-none-eabihf]
rustflags = [
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "opt-level=z",
]
